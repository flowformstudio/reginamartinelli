<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:30px 28px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 22px; align-items: end; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 12px; }
  .demo { width: 100%; height: 64px; background: #fff; border-radius: 12px; }
  .s1 { box-shadow: 0 8px 30px rgba(41,0,51,0.08); }
  .s2 { box-shadow: 0 12px 40px rgba(41,0,51,0.10); }
  .s3 { box-shadow: 0 24px 60px rgba(41,0,51,0.14); }
  .s4 { box-shadow: 0 8px 30px rgba(198,162,75,0.25); }
  .nm { font-size: 12px; color: var(--fg1); font-weight: 600; }
  .vl { font-size: 10.5px; color: var(--fg3); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="demo s1"></div><div class="nm">soft</div><div class="vl">0 8 30 rgba(41,0,51,.08)</div></div>
    <div class="item"><div class="demo s2"></div><div class="nm">card</div><div class="vl">0 12 40 / .10</div></div>
    <div class="item"><div class="demo s3"></div><div class="nm">lifted</div><div class="vl">0 24 60 / .14</div></div>
    <div class="item"><div class="demo s4"></div><div class="nm">gold</div><div class="vl">0 8 30 gold/.25</div></div>
  </div>
</body></html>
