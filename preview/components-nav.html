<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Navigation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:0; background: linear-gradient(180deg,#FDE9DC 0%,#F7C9DC 60%,#C8B6F0 100%); font-family: var(--font-sans); }
  nav { display:flex; align-items: center; justify-content: space-between; padding: 22px 32px; }
  .brand { font-family: var(--font-serif); font-size: 22px; color: #290033; letter-spacing: .12em; text-transform: uppercase; }
  .brand img { height: 28px; vertical-align: middle; filter: invert(15%) sepia(45%) saturate(2200%) hue-rotate(265deg) brightness(35%); }
  .links { display: flex; gap: 28px; }
  .links a { color: #290033; text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: .04em; }
  .links a:hover { color: #A86DDF; }
  .cta { background:#A86DDF; color:#fff; padding: 10px 18px; border-radius: 6.8px; font-size: 14px; font-weight:500; text-decoration:none; }
</style></head>
<body>
  <nav>
    <div class="brand">Regina&nbsp;Martinelli</div>
    <div class="links">
      <a>Programs</a>
      <a>About</a>
      <a>TV Show</a>
      <a>Let's Talk Money</a>
    </div>
    <a class="cta" href="#">Begin the Work</a>
  </nav>
</body></html>
