<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Program card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background: linear-gradient(180deg,#FDE9DC 0%,#F7C9DC 60%,#F5A6E4 100%); font-family: var(--font-sans); }
  .card {
    background: rgba(255,255,255,.78);
    backdrop-filter: blur(2px);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(41,0,51,.10);
    padding: 28px 28px 26px;
    max-width: 560px;
    position: relative;
    overflow: hidden;
  }
  .mark { position:absolute; top: 14px; right: 14px; width: 56px; height: 56px; opacity: .9; }
  .eyebrow { font-size: 11.5px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: #A86DDF; margin-bottom: 12px; }
  h3 { font-family: var(--font-serif); font-weight: 400; font-size: 30px; color: #642875; margin: 0 0 4px; letter-spacing: -.01em; }
  .sub { font-family: var(--font-serif); font-style: italic; font-size: 17px; color: #7A4D88; margin-bottom: 14px; }
  p { font-size: 15px; line-height: 1.7; color: #4f2960; margin: 0 0 18px; max-width: 44ch; }
  p strong { color: #290033; }
  .cta { color: #642875; font-weight: 500; font-size: 15px; text-decoration: none; }
  .cta:hover { color: #A86DDF; }
</style></head>
<body>
  <div class="card">
    <img class="mark" src="../assets/sacred-geo-22.png" alt="" />
    <div class="eyebrow">8-Week Journey</div>
    <h3>Your Magical Self</h3>
    <div class="sub">When chaos has become your normal</div>
    <p>Transform patterns of overwhelm, people-pleasing, and self-doubt into unshakeable inner knowing. <strong>Stop surviving. Start creating.</strong></p>
    <a class="cta" href="#">Discover Your Magical Self →</a>
  </div>
</body></html>
