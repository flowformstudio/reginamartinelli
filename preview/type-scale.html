<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Heading scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 28px; background:#fff; }
  .row { display:flex; align-items:baseline; gap:18px; padding: 6px 0; border-bottom: 1px solid rgba(41,0,51,.06); }
  .row:last-child { border-bottom: 0; }
  .lbl { width: 36px; font-family: var(--font-sans); font-size: 11px; color: var(--fg3); letter-spacing: .08em; text-transform: uppercase; flex:none; }
  .txt { font-family: var(--font-serif); color: var(--fg1); line-height: 1.15; letter-spacing: -0.01em; }
  .h1 { font-size: 56px; } .h2 { font-size: 40px; } .h3 { font-size: 28px; } .h4 { font-size: 22px; }
  .px { margin-left:auto; font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
</style></head>
<body>
  <div class="row"><span class="lbl">H1</span><span class="txt h1">Your Wealthy Self</span><span class="px">6.5rem · 104</span></div>
  <div class="row"><span class="lbl">H2</span><span class="txt h2">What's Actually Possible</span><span class="px">4.2rem · 67</span></div>
  <div class="row"><span class="lbl">H3</span><span class="txt h3">A Journey Back to Myself</span><span class="px">2.9rem · 46</span></div>
  <div class="row"><span class="lbl">H4</span><span class="txt h4">The Truth Nobody Says</span><span class="px">2rem · 32</span></div>
</body></html>
