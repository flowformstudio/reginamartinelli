<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Utility type</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 28px; background:#fff; }
  .block { display:flex; flex-direction:column; gap: 22px; }
  .row { display:flex; align-items:baseline; gap: 20px; }
  .lbl { width: 100px; font-family: var(--font-sans); font-size: 10.5px; color: var(--fg3); letter-spacing: .08em; text-transform: uppercase; flex:none; }
  .quote { font-family: var(--font-serif); font-style: italic; font-size: 26px; color: var(--fg1); line-height: 1.3; }
  .quote .em { font-style: italic; }
  .sig { font-family: var(--font-serif); font-style: italic; font-size: 30px; color: var(--fg1); }
  .eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rm-accent); }
  .arrow { font-family: var(--font-sans); font-size: 16px; font-weight: 500; color: var(--rm-primary); }
  .arrow .a { color: var(--rm-accent); }
</style></head>
<body>
  <div class="block">
    <div class="row"><span class="lbl">Eyebrow</span><span class="eyebrow">Programs · 8-Week Journey</span></div>
    <div class="row"><span class="lbl">Pull-quote</span><span class="quote">"How good can you stand it?"</span></div>
    <div class="row"><span class="lbl">Signature</span><span class="sig">With love &amp; certainty,</span></div>
    <div class="row"><span class="lbl">CTA arrow</span><span class="arrow">Discover Your Magical Self <span class="a">→</span></span></div>
  </div>
</body></html>
