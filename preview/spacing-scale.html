<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:22px 28px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:14px; margin-bottom: 9px; font-size: 12px; color: var(--fg2); }
  .lbl { width: 34px; font-weight: 600; color: var(--fg1); font-family: var(--font-mono); font-size: 11px; }
  .px  { width: 56px; font-family: var(--font-mono); color: var(--fg3); }
  .bar { height: 10px; background: linear-gradient(90deg, #A86DDF, #F5A6E4); border-radius: 4px; }
</style></head>
<body>
  <div class="row"><span class="lbl">2xs</span><span class="px">4 px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="lbl">xs</span><span class="px">8 px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl">sm</span><span class="px">16 px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lbl">md</span><span class="px">32 px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lbl">lg</span><span class="px">64 px</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="lbl">xl</span><span class="px">128 px</span><span class="bar" style="width:128px"></span></div>
  <div class="row"><span class="lbl">2xl</span><span class="px">192 px</span><span class="bar" style="width:192px"></span></div>
</body></html>
