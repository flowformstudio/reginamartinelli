<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Form input</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 28px; background:#fff; font-family: var(--font-sans); color: #642875; }
  .stack { display:flex; flex-direction:column; gap: 14px; max-width: 460px; }
  label { font-size: 11.5px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: #A86DDF; }
  input, textarea {
    font-family: inherit; font-size: 16px; color: #290033;
    background: #fff;
    padding: 14px 16px;
    border: 1.5px solid rgba(100,40,117,.18);
    border-radius: 6.8px;
    width: 100%; box-sizing: border-box;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus, textarea:focus { outline: 0; border-color: #A86DDF; box-shadow: 0 0 0 4px rgba(168,109,223,.18); }
  .field { display:flex; flex-direction:column; gap: 6px; }
  .btn { background: #A86DDF; color: #fff; border: 0; padding: 14px 22px; border-radius: 6.8px; font-size: 16px; font-weight: 500; cursor: pointer; align-self: flex-start; }
  .btn:hover { opacity: .92; }
</style></head>
<body>
  <div class="stack">
    <div class="field">
      <label>Your Name</label>
      <input type="text" value="Sophia" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="you@example.com" />
    </div>
    <button class="btn">Send Me The Guide</button>
  </div>
</body></html>
