<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Sparkle list</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 30px; background:#fff; font-family: var(--font-sans); color: #642875; }
  h4 { font-family: var(--font-serif); font-weight: 400; font-size: 24px; color: #290033; margin: 0 0 14px; letter-spacing:-.01em; }
  ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  li { display: flex; gap: 10px; font-size: 15px; line-height: 1.65; }
  li .s { color: #C6A24B; font-size: 16px; line-height: 1.55; }
  li strong { color: #290033; font-weight: 600; }
</style></head>
<body>
  <h4>On The Other Side</h4>
  <ul>
    <li><span class="s">✨</span><span><strong>Money</strong> becomes your ally instead of your stress</span></li>
    <li><span class="s">✨</span><span>Decisions flow from your <strong>inner knowing</strong>, not from polling everyone</span></li>
    <li><span class="s">✨</span><span><strong>Boundaries</strong> happen clean, without guilt or explanation</span></li>
    <li><span class="s">✨</span><span><strong>Peace</strong> lives in your bones, even in uncertainty</span></li>
  </ul>
</body></html>
