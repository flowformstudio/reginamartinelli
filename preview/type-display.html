<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Display serif</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:28px 32px; background:#fff; }
  .specimen { font-family: var(--font-serif); color: var(--fg1); line-height: 1.05; letter-spacing: -0.01em; }
  .big { font-size: 88px; font-weight: 400; }
  .meta { margin-top: 18px; font-family: var(--font-sans); font-size: 12px; color: var(--fg3); letter-spacing: .02em; }

</style></head>
<body>
  <div class="specimen big">Welcome…</div>
  <div class="meta"><strong>orpheus-pro</strong> · 400 · italic available · subbed with Cormorant Garamond when Typekit is unavailable</div>
</body></html>
