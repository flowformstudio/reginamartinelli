<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Sacred geometry library</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:18px; background:#FAF5F0; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .cell { background:#fff; aspect-ratio: 1/1; border-radius: 8px; display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 16px rgba(41,0,51,.05); padding: 8px; }
  .cell img { max-width: 80%; max-height: 80%; }
</style></head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/mandala-gold.png" /></div>
    <div class="cell"><img src="../assets/sacred-geo-22.png" /></div>
    <div class="cell"><img src="../assets/sacred-geo-23.png" /></div>
    <div class="cell"><img src="../assets/sacred-geo-15.png" /></div>
    <div class="cell"><img src="../assets/sacred-geo-45.png" /></div>
    <div class="cell"><img src="../assets/sacred-geo-62.png" /></div>
    <div class="cell"><img src="../assets/gold-sparkle-sun.png" /></div>
    <div class="cell"><img src="../assets/gold-frame.png" /></div>
    <div class="cell"><img src="../assets/logo-mark-gold.png" /></div>
    <div class="cell"><img src="../assets/logo-mark-large.png" /></div>
  </div>
</body></html>
