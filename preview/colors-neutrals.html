<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Neutrals & ornament</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#fff; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { aspect-ratio: 1 / 1; border-radius:14px; border:1px solid rgba(41,0,51,.06); box-shadow: var(--shadow-soft); }
  .meta { display:flex; justify-content:space-between; align-items:baseline; font-family: var(--font-sans); font-size: 12px; color: var(--fg2); }
  .name { font-weight: 600; color: var(--fg1); letter-spacing: .02em; }
  .hex  { font-feature-settings: "tnum"; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><span class="name">White</span><span class="hex">#FFFFFF</span></div></div>
    <div class="sw"><div class="chip" style="background:#FAF5F0"></div><div class="meta"><span class="name">Cream</span><span class="hex">#FAF5F0</span></div></div>
    <div class="sw"><div class="chip" style="background:#C6A24B"></div><div class="meta"><span class="name">Gold</span><span class="hex">#C6A24B</span></div></div>
    <div class="sw"><div class="chip" style="background:#E5CC85"></div><div class="meta"><span class="name">Gold Soft</span><span class="hex">#E5CC85</span></div></div>
  </div>
</body></html>
