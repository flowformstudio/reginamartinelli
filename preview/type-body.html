<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 28px; background:#fff; font-family: var(--font-sans); color: var(--fg1); }
  .lede { font-size: 18px; line-height: 1.84; max-width: 60ch; }
  .lede em { font-style: italic; }
  .lede strong { font-weight: 700; }
  .meta { margin-top: 14px; font-size: 11px; color: var(--fg3); letter-spacing: .04em; }
  .meta strong { color: var(--fg2); font-weight: 600; }
</style></head>
<body>
  <p class="lede">I help you transform the deep patterns keeping you stuck—whether they show up as money blocks, self-doubt, or that <em>exhausting</em> need to prove you're worth something. <strong>Money is a spiritual highlighter.</strong></p>
  <div class="meta"><strong>Inter Tight</strong> · 18 / 1.84 · weights 400 · 500 · 700 · italic</div>
</body></html>
